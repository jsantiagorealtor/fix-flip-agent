def _fmt_money(n: int) -> str:
    return f"${n:,}"


def _profit_color(profit: int) -> str:
    if profit >= 40_000: return "#2E7D32"
    if profit >= 25_000: return "#1565C0"
    if profit >= 10_000: return "#E65100"
    return "#C62828"


